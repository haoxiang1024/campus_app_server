<link href="./css/sweetalert2.min.css" rel="stylesheet">
<style>
    .content-wrapper { background: #ffffff !important; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 25px; margin: 15px; color: #333 !important; }
    .text-custom-blue { color: #00aaff !important; }

    .table-light th { background-color: #f8f9fa !important; color: #666 !important; font-weight: 600; }
    .table img { width: 45px; height: 45px; object-fit: cover; border-radius: 6px; border: 1px solid #dee2e6; }

    .btn-link { text-decoration: none !important; }
    .btn-link:hover { text-decoration: none !important; opacity: 0.8; }

    .btn-outline-custom { color: #00aaff !important; border-color: #dee2e6 !important; }
    .btn-outline-custom:hover:not(:disabled) { background-color: #00aaff !important; color: white !important; }
    .status-on { color: #28a745; font-weight: 500; }
    .status-off { color: #dc3545; font-weight: 500; }

    #itemImagePreview { width: 80px; height: 80px; object-fit: cover; border-radius: 6px; border: 2px dashed #dee2e6; margin-bottom: 10px; }

    .form-select-sm { border-color: #dee2e6 !important; color: #666; }
</style>

<div class="content-wrapper">
    <div class="d-flex justify-content-between align-items-center mb-4 gap-3 flex-wrap">
        <div class="d-flex gap-2">
            <button class="btn btn-outline-success btn-sm" id="batchOnShelfBtn">上架</button>
            <button class="btn btn-outline-danger btn-sm" id="batchOffShelfBtn">下架</button>
            <button class="btn btn-warning btn-sm text-white px-3" onclick="showAddModal()">+ 添加商品</button>
        </div>
        <div class="d-flex gap-2">
            <select id="statusFilter" class="form-select form-select-sm" style="width: 100px;">
                <option value="">所有状态</option>
                <option value="1">已上架</option>
                <option value="0">已下架</option>
            </select>
            <div class="input-group input-group-sm" style="width: 220px;">
                <input type="text" id="searchInput" class="form-control" placeholder="搜索商品名称...">
                <button class="btn btn-primary" type="button" id="searchBtn">
                    <i class="fa fa-search"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead class="table-light">
            <tr>
                <th style="width: 45px;"><input type="checkbox" id="selectAll" class="form-check-input"></th>
                <th>ID</th>
                <th>图片</th>
                <th>商品名称</th>
                <th>所需积分</th>
                <th>库存</th>
                <th>状态</th>
                <th class="text-center">操作</th>
            </tr>
            </thead>
            <tbody id="itemList">
            <tr><td colspan="8" class="text-center text-muted">数据加载中...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="d-flex flex-column align-items-center mt-4">
        <div class="d-flex align-items-center gap-3">
            <div class="btn-group">
                <button class="btn btn-sm btn-outline-custom px-3" id="btnFirstPage">首页</button>
                <button class="btn btn-sm btn-outline-custom px-3" id="btnPrevPage">上一页</button>
            </div>
            <span id="pageInfo" class="text-custom-blue fw-bold">第 1 页 / 共 1 页</span>
            <div class="btn-group">
                <button class="btn btn-sm btn-outline-custom px-3" id="btnNextPage">下一页</button>
                <button class="btn btn-sm btn-outline-custom px-3" id="btnLastPage">末页</button>
            </div>
        </div>
        <div class="mt-2 text-muted small">共 <span id="totalCount">0</span> 条记录</div>
    </div>
</div>

<div class="modal fade" id="itemModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow-lg border-0">
            <div class="modal-header">
                <h5 class="modal-title fw-bold text-custom-blue" id="modalTitle">编辑商品</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="itemForm">
                    <input type="hidden" id="itemId" name="id">
                    <div class="mb-3 text-center">
                        <div><img src="./img/default.png" id="itemImagePreview"></div>
                        <label for="itemImageFile" class="btn btn-sm btn-outline-secondary mt-2">点击上传图片</label>
                        <input type="file" id="itemImageFile" name="imageFile" accept="image/*" style="display: none;">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">商品名称</label>
                        <input type="text" class="form-control" id="itemName" name="name" required>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">所需积分</label>
                            <input type="number" class="form-control" id="itemPoints" name="required_points" required>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">库存</label>
                            <input type="number" class="form-control" id="itemStock" name="stock" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">初始状态</label>
                        <select class="form-select" id="itemStatus" name="status">
                            <option value="1">上架</option>
                            <option value="0">下架</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary btn-sm" onclick="saveItem()">保存提交</button>
            </div>
        </div>
    </div>
</div>

<script src="./js/jquery.min.js"></script>
<script src="./js/bootstrap.bundle.min.js"></script>
<script src="./js/sweetalert2@11.js"></script>

<script>
    (function() {
        let currentPage = 1;
        let totalPages = 1;
        const pageSize = 10;
        let allItemsData = [];

        window.Toast = window.Toast || {
            success: (msg) => Swal.fire({ icon: 'success', title: msg, toast: true, position: 'top-end', showConfirmButton: false, timer: 2000, width: '220px' }),
            error: (msg) => Swal.fire({ icon: 'error', title: '失败', text: msg || '错误', confirmButtonColor: '#00aaff' }),
            confirm: (title, text, cb) => Swal.fire({ title, text, icon: 'warning', showCancelButton: true, confirmButtonText: '确定', cancelButtonText: '取消' }).then(r => r.isConfirmed && cb())
        };

        window.loadItems = function(page) {
            currentPage = page || 1;
            const keyword = $('#searchInput').val().trim();
            const status = $('#statusFilter').val();

            $('#itemList').html('<tr><td colspan="8" class="text-center text-muted">数据检索中...</td></tr>');

            $.get('/school/shop/items/all', { page: currentPage, pageSize, keyword, status }, function(res) {
                if(res.status === 0 && res.data) {
                    allItemsData = res.data.list || res.data || [];
                    const total = res.data.total || allItemsData.length;
                    totalPages = res.data.totalPages || Math.ceil(total / pageSize) || 1;

                    let html = allItemsData.length ? '' : '<tr><td colspan="8" class="text-center text-muted">暂无数据</td></tr>';
                    allItemsData.forEach(item => {
                        const isUp = item.status === 1;
                        const imgUrl = item.image_url ? (item.image_url.startsWith('http') ? item.image_url : '/school/upload/' + item.image_url) : './img/default.png';

                        html += `
                            <tr>
                                <td><input type="checkbox" class="item-checkbox form-check-input" value="${item.id}"></td>
                                <td>${item.id}</td>
                                <td><img src="${imgUrl}" onerror="this.src='./img/default.png'"></td>
                                <td class="fw-bold">${item.name}</td>
                                <td><span class="badge bg-warning text-dark">${item.required_points}</span></td>
                                <td>${item.stock}</td>
                                <td><span class="${isUp ? 'status-on' : 'status-off'}">${isUp ? '上架' : '已下架'}</span></td>
                                <td class="text-center">
                                    <button class="btn btn-sm btn-link text-custom-blue p-0 me-2" onclick='showEditModal(${JSON.stringify(item)})'>编辑</button>
                                    <button class="btn btn-sm btn-link ${isUp ? 'text-danger' : 'text-success'} p-0" onclick="updateStatus(${item.id}, ${isUp ? 0 : 1})">${isUp ? '下架' : '上架'}</button>
                                </td>
                            </tr>`;
                    });

                    $('#itemList').html(html);
                    $('#pageInfo').text(`第 ${currentPage} 页 / 共 ${totalPages} 页`);
                    $('#totalCount').text(total);
                    $('#btnFirstPage, #btnPrevPage').prop('disabled', currentPage <= 1);
                    $('#btnNextPage, #btnLastPage').prop('disabled', currentPage >= totalPages);
                    $('#selectAll').prop('checked', false);
                }
            });
        };

        window.saveItem = function() {
            const form = $('#itemForm')[0];
            if (!form.checkValidity()) return form.reportValidity();

            const formData = new FormData(form);
            $.ajax({
                url: '/school/shop/item/save',
                type: 'POST',
                data: formData,
                processData: false,
                contentType: false,
                success: (res) => {
                    if(res.status === 0) {
                        window.Toast.success('提交成功');
                        bootstrap.Modal.getOrCreateInstance('#itemModal').hide();
                        window.loadItems(currentPage);
                    }
                }
            });
        };

        window.updateStatus = function(id, status) {
            const txt = status === 1 ? '上架' : '下架';
            window.Toast.confirm("操作确认", `确定${txt}该商品吗？`, () => {
                $.post('/school/shop/updateStatus', { id, status }, (res) => {
                    if(res.status === 0) { window.Toast.success(txt + '成功'); window.loadItems(currentPage); }
                });
            });
        };

        function batchStatus(status, txt) {
            const ids = $('.item-checkbox:checked').map(function(){ return $(this).val(); }).get();
            if(!ids.length) return window.Toast.error('请勾选商品');

            window.Toast.confirm("批量" + txt, `确定操作选中的 ${ids.length} 件商品吗？`, () => {
                const reqs = ids.map(id => $.post('/school/shop/updateStatus', { id, status }));
                Promise.allSettled(reqs).then(() => { window.Toast.success('批量处理完成'); window.loadItems(currentPage); });
            });
        }

        window.showAddModal = () => {
            $('#itemForm')[0].reset();
            $('#itemId').val('');
            $('#itemImagePreview').attr('src', './img/default.png');
            $('#modalTitle').text('添加新商品');
            bootstrap.Modal.getOrCreateInstance('#itemModal').show();
        };

        window.showEditModal = (item) => {
            $('#itemId').val(item.id);
            $('#itemName').val(item.name);
            $('#itemPoints').val(item.required_points);
            $('#itemStock').val(item.stock);
            $('#itemStatus').val(item.status);
            const imgUrl = item.image_url ? (item.image_url.startsWith('http') ? item.image_url : '/school/upload/' + item.image_url) : './img/default.png';
            $('#itemImagePreview').attr('src', imgUrl);
            $('#modalTitle').text('编辑商品详情');
            bootstrap.Modal.getOrCreateInstance('#itemModal').show();
        };

        // 搜索相关事件绑定
        $(document).off('click', '#searchBtn').on('click', '#searchBtn', () => window.loadItems(1));
        $(document).off('keypress', '#searchInput').on('keypress', '#searchInput', (e) => { if(e.which === 13) window.loadItems(1); });

        // 绑定状态下拉框改变事件，改变后重新从第一页加载
        $(document).off('change', '#statusFilter').on('change', '#statusFilter', () => window.loadItems(1));

        $(document).off('click', '#btnFirstPage').on('click', '#btnFirstPage', () => window.loadItems(1));
        $(document).off('click', '#btnPrevPage').on('click', '#btnPrevPage', () => window.loadItems(currentPage - 1));
        $(document).off('click', '#btnNextPage').on('click', '#btnNextPage', () => window.loadItems(currentPage + 1));
        $(document).off('click', '#btnLastPage').on('click', '#btnLastPage', () => window.loadItems(totalPages));
        $(document).off('change', '#selectAll').on('change', '#selectAll', function() { $('.item-checkbox').prop('checked', this.checked); });
        $(document).off('click', '#batchOnShelfBtn').on('click', '#batchOnShelfBtn', () => batchStatus(1, '上架'));
        $(document).off('click', '#batchOffShelfBtn').on('click', '#batchOffShelfBtn', () => batchStatus(0, '下架'));
        $(document).off('change', '#itemImageFile').on('change', '#itemImageFile', function() {
            const file = this.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (e) => $('#itemImagePreview').attr('src', e.target.result);
                reader.readAsDataURL(file);
            }
        });

        window.loadItems(1);
    })();
</script>
