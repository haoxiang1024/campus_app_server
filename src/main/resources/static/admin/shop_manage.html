<link href="./css/sweetalert2.min.css" rel="stylesheet">
<style>
    /* 统一页面容器与基础色调 */
    .content-wrapper {
        background: #ffffff !important;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        padding: 25px;
        margin: 15px;
        color: #333 !important;
    }
    .text-custom-blue { color: #00aaff !important; }

    /* 统一表格结构 */
    .table-light th {
        background-color: #f8f9fa !important;
        color: #666 !important;
        font-weight: 600;
    }

    /* 分页按钮自定义样式 */
    .btn-outline-custom { color: #00aaff !important; border-color: #dee2e6 !important; }
    .btn-outline-custom:hover:not(:disabled) { background-color: #00aaff !important; color: white !important; }
    .btn-outline-custom:disabled { cursor: not-allowed; opacity: 0.5; }

    /* 业务图片样式优化 */
    .table img {
        width: 50px;
        height: 50px;
        object-fit: cover;
        border-radius: 6px;
        border: 1px solid #dee2e6;
    }

    /* 商品图片预览样式 */
    #itemImagePreview {
        width: 80px;
        height: 80px;
        object-fit: cover;
        border-radius: 6px;
        border: 2px dashed #dee2e6;
        margin-bottom: 10px;
    }
    .status-on { color: #28a745; font-weight: 500; }
    .status-off { color: #dc3545; font-weight: 500; }
</style>

<div class="content-wrapper">
    <div class="d-flex justify-content-between align-items-center mb-4 gap-3 flex-wrap">
        <div class="d-flex gap-2">
            <button class="btn btn-outline-success btn-sm" id="batchOnShelfBtn">上架</button>
            <button class="btn btn-outline-danger btn-sm" id="batchOffShelfBtn">下架</button>
            <button class="btn btn-warning btn-sm text-white px-3" onclick="showAddModal()">+ 添加商品</button>
        </div>
        <div class="d-flex gap-2">
            <div class="input-group input-group-sm" style="width: 250px;">
                <input type="text" id="searchInput" class="form-control" placeholder="搜索商品名称...">
                <button class="btn btn-primary" type="button" id="searchBtn">
                    <i class="fa fa-search"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead class="table-light">
            <tr>
                <th style="width: 45px;"><input type="checkbox" id="selectAll" class="form-check-input"></th>
                <th>ID</th>
                <th>图片</th>
                <th>商品名称</th>
                <th>所需积分</th>
                <th>库存</th>
                <th>状态</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody id="itemList">
            <tr><td colspan="8" class="text-center text-muted">正在加载数据...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="d-flex flex-column align-items-center mt-4" id="paginationWrapper">
        <div class="d-flex align-items-center gap-3">
            <div class="btn-group">
                <button class="btn btn-sm btn-outline-custom px-3" id="btnFirstPage">首页</button>
                <button class="btn btn-sm btn-outline-custom px-3" id="btnPrevPage">上一页</button>
            </div>
            <span id="pageInfo" class="text-custom-blue fw-bold">第 1 页 / 共 1 页</span>
            <div class="btn-group">
                <button class="btn btn-sm btn-outline-custom px-3" id="btnNextPage">下一页</button>
                <button class="btn btn-sm btn-outline-custom px-3" id="btnLastPage">末页</button>
            </div>
        </div>
        <div class="mt-2 text-muted small">共 <span id="totalCount">0</span> 条记录</div>
    </div>
</div>

<div class="modal fade" id="itemModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow-lg border-0">
            <div class="modal-header">
                <h5 class="modal-title fw-bold text-custom-blue" id="modalTitle">编辑商品</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="itemForm" enctype="multipart/form-data">
                    <input type="hidden" id="itemId" name="id">
                    <input type="hidden" id="existingImage" name="image_url">

                    <div class="mb-3 text-center">
                        <div><img src="./img/default.png" id="itemImagePreview" onerror="this.src='./img/default.png'"></div>
                        <label for="itemImageFile" class="btn btn-sm btn-outline-secondary">上传商品图片</label>
                        <input type="file" id="itemImageFile" name="imageFile" accept="image/*" style="display: none;">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">商品名称</label>
                        <input type="text" class="form-control" id="itemName" name="name" required>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">所需积分</label>
                            <input type="number" class="form-control" id="itemPoints" name="required_points" required>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">库存</label>
                            <input type="number" class="form-control" id="itemStock" name="stock" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">状态</label>
                        <select class="form-select" id="itemStatus" name="status">
                            <option value="1">上架</option>
                            <option value="0">下架</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">描述</label>
                        <textarea class="form-control" id="itemDesc" name="description" rows="3"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-top-0">
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary btn-sm" onclick="saveItem()">保存</button>
            </div>
        </div>
    </div>
</div>

<script src="./js/jquery.min.js"></script>
<script src="./js/bootstrap.bundle.min.js"></script>
<script src="./js/sweetalert2@11.js"></script>

<script>
    (function() {
        // 分页及表格状态变量
        let currentPage = 1;
        let totalPages = 1;
        const pageSize = 10;
        let allItemsData = [];

        // 统一Toast提示配置
        window.Toast = window.Toast || {
            success: (msg) => { Swal.fire({ icon: 'success', title: msg, toast: true, position: 'top-end', showConfirmButton: false, timer: 2000, width: '220px', padding: '0.5rem' }); },
            error: (msg) => { Swal.fire({ icon: 'error', title: '操作失败', text: msg || '未知错误', confirmButtonColor: '#00aaff', width: '320px' }); },
            confirm: (title, text, callback) => { Swal.fire({ title: title, text: text, icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', cancelButtonColor: '#6c757d', confirmButtonText: '确定', cancelButtonText: '取消' }).then((result) => { if (result.isConfirmed && typeof callback === 'function') { callback(); } }); }
        };

        $(function() {
            loadItems(1);
            initEvents();
        });

        function initEvents() {
            // 图片预览逻辑
            $('#itemImageFile').off('change').on('change', function() {
                const file = this.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        $('#itemImagePreview').attr('src', e.target.result);
                    }
                    reader.readAsDataURL(file);
                }
            });

            // 全选逻辑
            $('#selectAll').off('change').on('change', function() {
                $('.item-checkbox').prop('checked', this.checked);
            });

            // 批量按钮操作
            $('#batchOnShelfBtn').off('click').on('click', () => handleBatchStatusUpdate(1, '上架'));
            $('#batchOffShelfBtn').off('click').on('click', () => handleBatchStatusUpdate(0, '下架'));

            // 搜索与分页按钮事件绑定 (已适配放大镜图标按钮)
            $('#searchBtn').off('click').on('click', () => loadItems(1));
            $('#searchInput').off('keypress').on('keypress', e => { if(e.which === 13) loadItems(1); });

            $('#btnFirstPage').off('click').on('click', () => loadItems(1));
            $('#btnLastPage').off('click').on('click', () => loadItems(totalPages));
            $('#btnPrevPage').off('click').on('click', () => { if(currentPage > 1) loadItems(currentPage - 1); });
            $('#btnNextPage').off('click').on('click', () => { if(currentPage < totalPages) loadItems(currentPage + 1); });
        }

        // 加载表格数据（含分页和模糊搜索）
        window.loadItems = function(page) {
            currentPage = page || 1;
            const keyword = $('#searchInput').val().trim();
            $('#itemList').html('<tr><td colspan="8" class="text-center text-muted">正在检索数据...</td></tr>');

            $.get('/school/shop/items/all', {
                page: currentPage,
                pageSize: pageSize,
                keyword: keyword
            }, function(res) {
                if(res.status === 0 && res.data) {
                    allItemsData = res.data.list || res.data || [];
                    const totalItems = res.data.total || allItemsData.length;
                    totalPages = res.data.totalPages || Math.ceil(totalItems / pageSize) || 1;

                    let html = '';
                    if (allItemsData.length === 0) {
                        html = '<tr><td colspan="8" class="text-center text-muted">暂无商品数据</td></tr>';
                    } else {
                        allItemsData.forEach(item => {
                            const statusBtnText = item.status === 1 ? '下架' : '上架';
                            const statusBtnClass = item.status === 1 ? 'text-danger' : 'text-success';
                            const targetStatus = item.status === 1 ? 0 : 1;

                            // 处理图片路径，和失物招领统一处理逻辑
                            let imgUrl = item.image_url ? '/school/upload/' + item.image_url : './img/default.png';
                            if (item.image_url && item.image_url.startsWith('http')) imgUrl = item.image_url;

                            html += `
                                <tr>
                                    <td><input type="checkbox" class="item-checkbox form-check-input" value="${item.id}"></td>
                                    <td>${item.id}</td>
                                    <td><img src="${imgUrl}" onerror="this.src='./img/default.png'"></td>
                                    <td class="fw-bold">${item.name}</td>
                                    <td><span class="badge bg-warning text-dark">${item.required_points}</span></td>
                                    <td>${item.stock}</td>
                                    <td><span class="${item.status === 1 ? 'status-on' : 'status-off'}">
                                        ${item.status === 1 ? '上架' : '已下架'}</span></td>
                                    <td>
                                        <button class="btn btn-sm btn-link text-custom-blue p-0 me-2" onclick='showEditModal(${JSON.stringify(item).replace(/'/g, "&apos;")})'>编辑</button>
                                        <button class="btn btn-sm btn-link ${statusBtnClass} p-0" onclick="updateStatus(${item.id}, ${targetStatus})">${statusBtnText}</button>
                                    </td>
                                </tr>`;
                        });
                    }
                    $('#itemList').html(html);
                    $('#selectAll').prop('checked', false);

                    $('#pageInfo').text(`第 ${currentPage} 页 / 共 ${totalPages} 页`);
                    $('#totalCount').text(totalItems);
                    $('#btnFirstPage, #btnPrevPage').prop('disabled', currentPage <= 1);
                    $('#btnNextPage, #btnLastPage').prop('disabled', currentPage >= totalPages);
                } else {
                    $('#itemList').html('<tr><td colspan="8" class="text-center text-danger">数据加载失败</td></tr>');
                }
            }).fail(() => {
                $('#itemList').html('<tr><td colspan="8" class="text-center text-danger">数据加载失败：网络异常</td></tr>');
            });
        }

        window.showAddModal = function() {
            $('#itemForm')[0].reset();
            $('#itemId').val('');
            $('#existingImage').val('');
            $('#itemImageFile').val('');
            $('#itemImagePreview').attr('src', './img/default.png');
            $('#modalTitle').text('添加商品');
            new bootstrap.Modal('#itemModal').show();
        }

        window.showEditModal = function(item) {
            $('#itemId').val(item.id);
            $('#itemName').val(item.name);
            $('#itemPoints').val(item.required_points || item.requiredPoints);
            $('#itemStock').val(item.stock);
            $('#itemStatus').val(item.status);
            $('#itemDesc').val(item.description);
            $('#existingImage').val(item.image_url || '');
            $('#itemImageFile').val('');

            let imgUrl = item.image_url ? '/school/upload/' + item.image_url : './img/default.png';
            if (item.image_url && item.image_url.startsWith('http')) imgUrl = item.image_url;
            $('#itemImagePreview').attr('src', imgUrl);

            $('#modalTitle').text('编辑商品');
            new bootstrap.Modal('#itemModal').show();
        }

        window.saveItem = function() {
            const form = $('#itemForm')[0];
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const formData = new FormData(form);
            const fileInput = document.getElementById('itemImageFile');

            if (fileInput.files.length === 0) {
                formData.delete('imageFile');
            }

            $.ajax({
                url: '/school/shop/item/save',
                type: 'POST',
                data: formData,
                processData: false,
                contentType: false,
                success: function(res) {
                    if(res.status === 0) {
                        window.Toast.success('保存成功');
                        bootstrap.Modal.getInstance('#itemModal').hide();
                        loadItems(currentPage);
                    } else {
                        window.Toast.error(res.msg || '保存失败');
                    }
                },
                error: function() {
                    window.Toast.error('服务器异常');
                }
            });
        }

        window.updateStatus = function(id, status) {
            const actionText = status === 1 ? '上架' : '下架';
            window.Toast.confirm("状态修改", `确定要${actionText}该商品吗?`, () => {
                $.post('/school/shop/updateStatus', { id: id, status: status }, function(res) {
                    if(res.status === 0) {
                        window.Toast.success(`${actionText}成功`);
                        loadItems(currentPage);
                    } else {
                        window.Toast.error(res.msg || '操作失败');
                    }
                }).fail(() => window.Toast.error('网络异常'));
            });
        }

        function handleBatchStatusUpdate(targetStatus, actionText) {
            const selectedIds = $('.item-checkbox:checked').map(function() { return $(this).val(); }).get();
            if (!selectedIds.length) {
                return window.Toast.error('请先勾选商品');
            }

            const targetIds = [];
            selectedIds.forEach(id => {
                const item = allItemsData.find(u => u.id == id);
                if (item && item.status !== targetStatus) targetIds.push(id);
            });

            if (!targetIds.length) {
                return window.Toast.success(`选中的商品已全部处于${actionText}状态`);
            }

            window.Toast.confirm(`批量${actionText}`, `确定操作选中的 ${targetIds.length} 件商品吗？`, () => {
                const promises = targetIds.map(id => $.post('/school/shop/updateStatus', { id: id, status: targetStatus }));
                Promise.allSettled(promises).then(() => {
                    window.Toast.success('批量处理完成');
                    loadItems(currentPage);
                }).catch(() => window.Toast.error('部分请求异常'));
            });
        }
    })();
</script>
